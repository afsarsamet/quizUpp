services:
  db:
    image: postgres:16
    container_name: quizupp_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 6767
      POSTGRES_DB: roomapp
    ports:
      - "5432:5432"
    volumes:
      - quizupp_postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: quizupp_backend
    restart: always
    environment:
      DB_USER: postgres
      DB_PASSWORD: 6767
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: roomapp
      JWT_SECRET: quizupp_super_secret_key
    ports:
      - "5000:5000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    container_name: quizupp_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  quizupp_postgres_data: